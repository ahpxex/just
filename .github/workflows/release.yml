name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app"
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry and build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Ubuntu system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: bun install

      # Unsigned build. To enable macOS signing + notarization, add the
      # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
      # / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID secrets and restore their
      # env entries below. tauri-action auto-detects and applies them.
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: just ${{ github.ref_name }}
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip macOS .app and attach to release
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          APP=$(find src-tauri/target -type d -name "just.app" -path "*release/bundle/macos/*" | head -1)
          if [ -z "$APP" ]; then
            echo "macOS .app not found under src-tauri/target"
            exit 1
          fi
          VERSION="${TAG#v}"
          ASSET="just_${VERSION}_universal.zip"
          cd "$(dirname "$APP")"
          /usr/bin/zip -r "$ASSET" "just.app"
          gh release upload "$TAG" "$ASSET" --repo "$REPO" --clobber
